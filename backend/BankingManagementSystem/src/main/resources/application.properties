spring.application.name=BankingManagementSystem
spring.datasource.url=jdbc:mysql://localhost:3306/bankingmanagementsystem
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.root=INFO
logging.level.com.banking=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %level - %logger - %msg%n